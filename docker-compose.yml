# docker-compose.yml — DagCity
# 'version' key removed (deprecated in Compose v2+)

services:
  dagcity:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dagcity-viz
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      - MANIFEST_PATH=/data/${MANIFEST_SUBPATH:-target/manifest.json}
      - PORT=${PORT:-8080}
    volumes:
      # The host path may not exist yet — always mount so the container
      # starts in 'Awaiting Data' mode; HOST_PROJECT_PATH defaults to a
      # local ./data directory so Docker Desktop never blocks the start.
      - ${HOST_PROJECT_PATH:-./data}:/data
    restart: unless-stopped
