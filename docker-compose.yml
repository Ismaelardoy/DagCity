# docker-compose.yml — DagCity
# 'version' key removed (deprecated in Compose v2+)

services:
  dagcity:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dagcity-viz
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      - MANIFEST_PATH=/data/${MANIFEST_SUBPATH:-target/manifest.json}
      - PORT=${PORT:-8080}
      - PROJECTS_DIR=/app/projects
      - WORKSPACE_PATH=/app/workspace.json
    volumes:
      # Mount the host project directory to /data in the container
      - ${HOST_PROJECT_PATH:-./data}:/data
      # Persist DagCity saved projects independently from live-sync mount
      - ./projects:/app/projects
    restart: unless-stopped
